name: Validate atomic editor publication

on:
  pull_request:
    branches: [main]
    paths:
      - 'publisher.js'
      - 'tools/validate_latest_updates.py'

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validate publisher and flexible layout checks
        run: |
          set -euo pipefail
          node --check publisher.js
          python3 tools/validate_latest_updates.py
