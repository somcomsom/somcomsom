name: Deploy SOM COM SOM

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Validate site
        run: |
          test -s index.html
          test -s styles.css
          test -s app.js
          test -s app-core.js
          test -s data/tree-part-1.mmd
          ! grep -R "jandboxing" index.html app.js app-core.js styles.css README.md data
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: .
          include-hidden-files: true
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
