name: Validate and deploy SOM COM SOM

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validate data, responsive layout, export and editor
        run: |
          set -euo pipefail
          test -s index.html
          test -s styles.css
          test -s interaction.css
          test -s mobile.css
          test -s desktop-layout-guard.css
          test -s app.js
          test -s export.js
          test -s drag-guard.js
          test -s mobile.js
          test -s pinch-zoom.js
          test -s relation-router.js
          test -s data-loader.js
          test -s admin.html
          test -s admin.css
          test -s admin.js
          test -s admin-editor.js
          test -s admin-preview.js
          test -s publisher.js
          python3 tools/validate_data.py
          python3 tools/export_gedcom.py
          node --check data-loader.js
          node --check relation-router.js
          node --check app.js
          node --check export.js
          node --check drag-guard.js
          node --check mobile.js
          node --check pinch-zoom.js
          node --check admin.js
          node --check admin-editor.js
          node --check admin-preview.js
          node --check publisher.js
          grep -q 'viewport-fit=cover' index.html
          grep -q 'orientation: portrait' mobile.css
          grep -q 'sidebar-toggle' index.html
          grep -q 'export-svg' index.html
          grep -q 'export-png' index.html
          grep -q 'mobile-backdrop' desktop-layout-guard.css
          grep -q 'grid-template-columns:minmax(0,1fr)' desktop-layout-guard.css
          grep -q 'sidebar.open' desktop-layout-guard.css
          grep -q 'pinch-zoom.js' mobile.js
          test -s data/somcomsom.ged
          test -s assets/background-manifest.json
          test -s assets/background-01.svgpart
          forbidden='jan''dboxing'
          ! grep -R "$forbidden" index.html admin.html app.js export.js drag-guard.js mobile.js pinch-zoom.js relation-router.js admin.js admin-editor.js admin-preview.js publisher.js data-loader.js styles.css interaction.css mobile.css desktop-layout-guard.css admin.css README.md data assets
      - uses: actions/configure-pages@v5
        if: github.event_name != 'pull_request'
      - uses: actions/upload-pages-artifact@v3
        if: github.event_name != 'pull_request'
        with:
          path: .
  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
