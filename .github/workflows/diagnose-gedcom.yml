name: Diagnose generated GEDCOM

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Generate GEDCOM
        run: python3 tools/export_gedcom.py
      - name: Upload generated GEDCOM
        uses: actions/upload-artifact@v4
        with:
          name: generated-gedcom
          path: data/somcomsom.ged
