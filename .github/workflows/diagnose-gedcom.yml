name: Diagnose validation failure

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run validation diagnostics
        shell: bash
        run: |
          set +e
          : > diagnostics.txt
          run_check() {
            echo "===== $* =====" >> diagnostics.txt
            "$@" >> diagnostics.txt 2>&1
            status=$?
            echo "STATUS=$status" >> diagnostics.txt
            echo >> diagnostics.txt
          }
          run_check python3 tools/validate_data.py
          run_check python3 tools/validate_latest_updates.py
          run_check python3 tools/export_gedcom.py
          run_check node --check data-loader.js
          run_check node --check relation-router.js
          run_check node --check app.js
          run_check node --check export.js
          run_check node --check drag-guard.js
          run_check node --check mobile.js
          run_check node --check pinch-zoom.js
          run_check node --check admin.js
          run_check node --check admin-editor.js
          run_check node --check admin-preview.js
          run_check node --check publisher.js
          cat diagnostics.txt
      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: validation-diagnostics
          path: diagnostics.txt
