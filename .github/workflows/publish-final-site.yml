name: Build clean maintainable SVG site

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  clean-and-validate:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.ref == 'final-svg-site'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout proposal branch
        uses: actions/checkout@v4
        with:
          ref: final-svg-site
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Reconstruct clean site from checked-in payload chunks
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import shutil, tarfile, tempfile, traceback

          root = Path.cwd()
          diagnostic = root / '.reconstruction-error.txt'
          try:
              chunks = sorted((root / 'payload-final').glob('part-*.csv'))
              if not chunks:
                  raise RuntimeError('No payload chunks found')

              packed = bytearray()
              report = []
              for path in chunks:
                  before = len(packed)
                  for line in path.read_text(encoding='utf-8').splitlines():
                      line = line.strip()
                      if line:
                          values = [int(value) for value in line.split(',')]
                          if any(value < 0 or value > 255 for value in values):
                              raise ValueError(f'Byte outside range in {path}')
                          packed.extend(values)
                  report.append(f'{path.name}: {len(packed)-before} bytes')

              work = Path(tempfile.mkdtemp(prefix='somcomsom-'))
              archive = work / 'site.tar.xz'
              archive.write_bytes(bytes(packed))
              report.append(f'total: {len(packed)} bytes')
              report.append(f'magic: {bytes(packed[:8]).hex()}')

              with tarfile.open(archive, mode='r:xz') as bundle:
                  names = bundle.getnames()
                  report.append(f'archive entries: {len(names)}')
                  bundle.extractall(work)

              source = work / 'somcomsom_site'
              if not source.is_dir():
                  candidates = [p for p in work.iterdir() if p.is_dir()]
                  report.append('directories: ' + ', '.join(p.name for p in candidates))
                  if len(candidates) != 1:
                      raise RuntimeError('Cannot identify extracted site directory')
                  source = candidates[0]

              keep_git = root / '.git'
              for item in list(root.iterdir()):
                  if item == keep_git:
                      continue
                  if item.is_dir():
                      shutil.rmtree(item)
                  else:
                      item.unlink()

              for item in source.iterdir():
                  target = root / item.name
                  if item.is_dir():
                      shutil.copytree(item, target)
                  else:
                      shutil.copy2(item, target)
          except Exception:
              diagnostic.write_text('\n'.join(locals().get('report', [])) + '\n\n' + traceback.format_exc(), encoding='utf-8')
              raise
          PY

      - name: Preserve reconstruction diagnostics
        if: failure()
        shell: bash
        run: |
          git config user.name 'somcomsom'
          git config user.email '305458386+somcomsom@users.noreply.github.com'
          git add .reconstruction-error.txt
          git commit -m 'Registra el diagnòstic de reconstrucció' || true
          git push origin HEAD:final-svg-site || true

      - name: Keep only the production workflow
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .github/workflows
          find .github/workflows -type f ! -name 'deploy-pages.yml' -delete
          touch .nojekyll

      - name: Validate editor, data and SVG application
        shell: bash
        run: |
          set -euo pipefail
          test -s index.html
          test -s styles.css
          test -s app.js
          test -s data-loader.js
          test -s admin.html
          test -s admin.css
          test -s admin.js
          test -s data/family-manifest.json
          test -s data/layout-manifest.json
          test -s data/somcomsom.ged
          test -s assets/background-manifest.json
          test -s assets/background-01.svgpart
          python3 tools/validate_data.py
          python3 tools/export_gedcom.py
          node --check data-loader.js
          node --check app.js
          node --check admin.js
          forbidden='jan''dboxing'
          ! grep -R "$forbidden" index.html admin.html app.js admin.js data-loader.js styles.css admin.css README.md data assets

      - name: Commit the cleaned proposal
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'somcomsom'
          git config user.email '305458386+somcomsom@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'The proposal is already clean.'
            exit 0
          fi
          git commit -m 'Neteja i valida l’arbre SVG mantenible'
          git push origin HEAD:final-svg-site
