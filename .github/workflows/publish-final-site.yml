name: Build clean maintainable SVG site

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  clean-and-validate:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.ref == 'final-svg-site'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout proposal branch
        uses: actions/checkout@v4
        with:
          ref: final-svg-site
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Reconstruct clean site from checked-in payload chunks
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          from io import BytesIO
          from itertools import permutations, combinations
          import lzma, shutil, tarfile, tempfile, traceback

          root = Path.cwd()
          diagnostic = root / '.reconstruction-error.txt'
          report = []
          try:
              paths = sorted((root / 'payload-final').glob('part-*.csv'))
              if not paths:
                  raise RuntimeError('No payload chunks found')

              pieces = {}
              for path in paths:
                  data = bytearray()
                  for line in path.read_text(encoding='utf-8').splitlines():
                      line = line.strip()
                      if line:
                          values = [int(value) for value in line.split(',')]
                          if any(value < 0 or value > 255 for value in values):
                              raise ValueError(f'Byte outside range in {path}')
                          data.extend(values)
                  pieces[path.name] = bytes(data)
                  report.append(f'{path.name}: {len(data)} bytes; first={bytes(data[:8]).hex()}; last={bytes(data[-8:]).hex()}')

              valid = None
              names = list(pieces)
              starters = [name for name in names if pieces[name].startswith(b'\xfd7zXZ\x00')]
              candidates = []
              for starter in starters:
                  rest = [name for name in names if name != starter]
                  for length in range(0, len(rest) + 1):
                      for tail in permutations(rest, length):
                          candidates.append((starter, *tail))

              for order in candidates:
                  packed = b''.join(pieces[name] for name in order)
                  try:
                      tar_bytes = lzma.decompress(packed)
                      with tarfile.open(fileobj=BytesIO(tar_bytes), mode='r:') as bundle:
                          members = bundle.getmembers()
                          if members:
                              valid = (order, tar_bytes, members)
                              break
                  except Exception:
                      continue

              if valid is None:
                  raise RuntimeError(f'No valid XZ/TAR combination among {len(candidates)} candidates')

              order, tar_bytes, members = valid
              report.append('valid order: ' + ', '.join(order))
              report.append(f'archive entries: {len(members)}')
              work = Path(tempfile.mkdtemp(prefix='somcomsom-'))
              with tarfile.open(fileobj=BytesIO(tar_bytes), mode='r:') as bundle:
                  bundle.extractall(work)

              source = work / 'somcomsom_site'
              if not source.is_dir():
                  candidates_dirs = [p for p in work.iterdir() if p.is_dir()]
                  report.append('directories: ' + ', '.join(p.name for p in candidates_dirs))
                  if len(candidates_dirs) != 1:
                      raise RuntimeError('Cannot identify extracted site directory')
                  source = candidates_dirs[0]

              keep_git = root / '.git'
              for item in list(root.iterdir()):
                  if item == keep_git:
                      continue
                  if item.is_dir():
                      shutil.rmtree(item)
                  else:
                      item.unlink()

              for item in source.iterdir():
                  target = root / item.name
                  if item.is_dir():
                      shutil.copytree(item, target)
                  else:
                      shutil.copy2(item, target)
          except Exception:
              diagnostic.write_text('\n'.join(report) + '\n\n' + traceback.format_exc(), encoding='utf-8')
              raise
          PY

      - name: Preserve reconstruction diagnostics
        if: failure()
        shell: bash
        run: |
          git config user.name 'somcomsom'
          git config user.email '305458386+somcomsom@users.noreply.github.com'
          git add .reconstruction-error.txt
          git commit -m 'Actualitza el diagnòstic de reconstrucció' || true
          git push origin HEAD:final-svg-site || true

      - name: Keep only the production workflow
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .github/workflows
          find .github/workflows -type f ! -name 'deploy-pages.yml' -delete
          touch .nojekyll

      - name: Validate editor, data and SVG application
        shell: bash
        run: |
          set -euo pipefail
          test -s index.html
          test -s styles.css
          test -s app.js
          test -s data-loader.js
          test -s admin.html
          test -s admin.css
          test -s admin.js
          test -s data/family-manifest.json
          test -s data/layout-manifest.json
          test -s data/somcomsom.ged
          test -s assets/background-manifest.json
          test -s assets/background-01.svgpart
          python3 tools/validate_data.py
          python3 tools/export_gedcom.py
          node --check data-loader.js
          node --check app.js
          node --check admin.js
          forbidden='jan''dboxing'
          ! grep -R "$forbidden" index.html admin.html app.js admin.js data-loader.js styles.css admin.css README.md data assets

      - name: Commit the cleaned proposal
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'somcomsom'
          git config user.email '305458386+somcomsom@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'The proposal is already clean.'
            exit 0
          fi
          git commit -m 'Neteja i valida l’arbre SVG mantenible'
          git push origin HEAD:final-svg-site
